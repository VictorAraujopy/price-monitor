services:

  db:
    image: postgres:16
    container_name: pricemonitor-db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  scraper:
    build: ./scraper
    container_name: pricemonitor-scraper
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ml:
    build: ./ml
    container_name: pricemonitor-ml
    env_file: .env
    volumes:
      - ml-models:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: ./api
    container_name: pricemonitor-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ml-models:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: pricemonitor-bot
    env_file: .env
    volumes:
      - ml-models:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  ml-models:
